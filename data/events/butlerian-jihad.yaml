- id: raquella-first-reverend-mother
  type: milestone
  title: "Raquella Becomes First Reverend Mother"
  description: "During the Omnius Scourge, Raquella Berto-Anirul undergoes a near-death transformation and becomes the first Reverend Mother, gaining access to Other Memory."
  detailed: |
    Poisoned by Ticia Cenva, Raquella survived through an internal biochemical
    transformation that gave her access to ancestral memories — Other Memory.
    This made her the first Reverend Mother. She founded the Sisterhood of Rossak,
    the predecessor to the Bene Gesserit order.

    Source: Dune: The Battle of Corrin (2004)
    Reference: https://dune.fandom.com/wiki/Raquella_Berto-Anirul
  date_start: -108
