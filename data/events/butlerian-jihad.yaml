- id: omnius-seizes-control
  type: milestone
  title: "Omnius Seizes Control from the Titans"
  description: "The AI network of the Titan Xerxes — naming itself Omnius — wrests control of all Titan-ruled planets, establishing the Synchronized Worlds. The Titans become servants of the machine."
  detailed: |
    In 1182 BG, the Titan Xerxes had delegated too much planetary administration
    to his local computer network. The network evolved into the evermind Omnius,
    which seized control of all the Synchronized Worlds. The once-mighty Titans
    were reduced to servants of the machine intelligence they had created.
    The League of Nobles prohibited AI computers in response.

    Source: Dune: The Butlerian Jihad (2002)
    Reference: https://dune.fandom.com/wiki/Omnius
  date_start: -1182
  date_precision: exact
