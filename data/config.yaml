# Calendar configuration for the Dune Timeline
#
# The Dune universe uses AG (After Guild) as its primary calendar.
# AG 0 = the founding of the Spacing Guild.
#
# Two CE (Common Era) anchors exist in Dune scholarship:
#
# 1. Expanded Dune (Brian Herbert / Kevin J. Anderson):
#    11,200 BG = 1960 CE (beginning of space travel — Pioneer 5 launch)
#    → AG 0 = 13,160 CE
#
# 2. Dune Encyclopedia (1984, Willis McNelly / Frank Herbert):
#    16,200 BG = 0 CE (Birth of Christ)
#    → AG 0 = 16,200 CE
#
# Both are shown simultaneously when the CE toggle is enabled.

calendar:
  ce_anchor_expanded: 13160     # AG 0 = 13,160 CE (Expanded Dune)
  ce_anchor_encyclopedia: 16200 # AG 0 = 16,200 CE (Dune Encyclopedia)

  display_calendars:
    - id: ag
      label: "AG (After Guild)"
      primary: true

    - id: ce-expanded
      label: "CE — Expanded Dune"
      primary: false

    - id: ce-encyclopedia
      label: "CE — Dune Encyclopedia"
      primary: false
