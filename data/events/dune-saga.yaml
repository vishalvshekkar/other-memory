- id: paul-blinded
  type: point
  title: "Paul Blinded by Stone Burner"
  description: "A stone burner detonation blinds Paul physically, though he continues to 'see' through prescient vision."
  detailed: |
    The exact year of this event is debated in Dune scholarship. Different wiki
    sources cite 10,207, 10,208, or 10,209 AG. We use 10,209 AG as the most
    book-consistent date, derived from: Children of Dune is set "nine years"
    after Paul's departure, and Children of Dune takes place in 10,219 AG.
    Working backward: 10,219 - 9 = 10,210 for Paul's departure, with the
    stone burner attack occurring shortly before.

    The Dune Messiah novel states it is set "twelve years" after Paul's
    coronation (10,193 AG), placing its beginning around 10,205 AG with
    events spanning several years to the conclusion.

    Sources consulted: dune.fandom.com/wiki/Paul_Atreides,
    dune.fandom.com/wiki/Chani_Kynes, dune.fandom.com/wiki/Last_conspiracy_against_Muad'Dib
  date_start: 10209
  date_precision: approximate
  significance: 4
  category: personal
  tags: ["stone-burner", "blindness", "prescience"]
  factions: ["atreides", "tleilaxu"]
  characters: ["paul-atreides"]
  books:
    - book_id: dune-messiah-1969

- id: paul-walks-into-desert
  type: milestone
  title: "Paul Walks into the Desert"
  subtitle: "The blind Fremen custom"
  description: "After the death of Chani in childbirth, Paul follows the blind Fremen tradition and walks into the desert, leaving his twin children Leto and Ghanima."
  detailed: |
    Chani died giving birth to the twins Leto II and Ghanima. Paul, now blind
    from the stone burner attack, chose to follow the Fremen custom for the
    blind and walked alone into the desert.

    Date note: We place this at 10,210 AG based on the most internally
    consistent book math — Children of Dune states it is set "nine years"
    after Paul's departure, and Children of Dune takes place in 10,219 AG
    (10,219 - 9 = 10,210). Other sources cite 10,207, 10,208, or 10,209.
    The Chani Kynes wiki page (dune.fandom.com) gives her death as 10,210 AG,
    which aligns with this calculation.
  date_start: 10210
  date_precision: approximate
  significance: 5
  category: personal
  tags: ["desert-walk", "fremen-tradition", "abdication"]
  factions: ["atreides", "fremen"]
  characters: ["paul-atreides", "chani"]
  books:
    - book_id: dune-messiah-1969
      chapters: ["Final chapters"]

