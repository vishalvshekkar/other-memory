# Calendar configuration for the Dune Timeline
#
# The Dune universe uses AG (After Guild) as its primary calendar.
# AG 0 = the founding of the Spacing Guild.
#
# The CE anchor is derived from the Expanded Dune timeline (Brian Herbert/KJA):
#   11,200 BG = 1960 CE (beginning of space travel — Pioneer 5 launch)
#   Therefore: AG 0 = 1960 + 11,200 = 13,160 CE
#
# Alternative: The Dune Encyclopedia (1984) uses 16,200 BG = 0 CE,
# giving AG 0 = 16,200 CE. We follow the Expanded Dune canon here.

calendar:
  ag_zero_ce_year: 13160

  display_calendars:
    - id: ag
      label: "AG (After Guild)"
      primary: true

    - id: ce
      label: "CE (Common Era)"
      primary: false
