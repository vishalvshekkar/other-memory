- id: battle-of-corrin
  type: milestone
  title: "Battle of Corrin"
  subtitle: "End of the thinking machines"
  description: "The decisive final battle of the Butlerian Jihad. Humanity destroys the last Omnius incarnation. Leads directly to the founding of the major institutions of the Imperium."
  detailed: |
    The Battle of Corrin was the final confrontation between human forces and the
    thinking machines. Vorian Atreides led the Army of Humanity against the last
    Synchronized World. The controversial use of human shields by the machines
    created a rift between Vorian Atreides and Abulurd Harkonnen (then Butler),
    leading to the Harkonnen disgrace and the blood feud that would echo for
    ten thousand years.
  date_start: -88
  date_precision: exact
  significance: 5
  category: military
  tags: ["corrin", "final-battle", "machine-destruction"]
  factions: ["thinking-machines"]
  characters: ["vorian-atreides", "abulurd-harkonnen"]
  books:
    - book_id: battle-of-corrin-2004
      notes: "Central event"
    - book_id: dune-1965
      notes: "Referenced historically"

