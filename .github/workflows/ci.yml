name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate YAML data files
        run: npm run validate

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript strict type check
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate, typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Production build
        run: npm run build

      - name: Report bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const distDir = 'dist/assets';
            const files = fs.readdirSync(distDir);

            let rows = '';
            let totalRaw = 0;

            for (const file of files.sort()) {
              const filePath = path.join(distDir, file);
              const stats = fs.statSync(filePath);
              const sizeKB = (stats.size / 1024).toFixed(2);
              totalRaw += stats.size;

              const ext = path.extname(file).slice(1).toUpperCase();
              rows += `| \`${file}\` | ${ext} | ${sizeKB} KB |\n`;
            }

            const totalKB = (totalRaw / 1024).toFixed(2);

            const body = `## Bundle Size Report

            | File | Type | Size |
            |------|------|------|
            ${rows}| **Total** | | **${totalKB} KB** |

            <details>
            <summary>Budget</summary>

            Spec target: < 200 KB gzipped JS (excluding data).
            </details>`.replace(/^            /gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
