- id: kralizec-final-battle
  type: milestone
  title: "Kralizec — The Final Battle"
  subtitle: "The battle at the end of the universe"
  description: "The prophesied Kralizec occurs as humanity and thinking machines clash in a final apocalyptic confrontation. The Ithaca is captured and brought to Synchrony."
  detailed: |
    In 15,264 AG — twenty-four years after leaving Chapterhouse — the no-ship
    Ithaca was captured by Omnius and brought to the planet Synchrony. The
    final battle featured a duel between Paul gholas, Murbella leading the
    New Sisterhood's fleet with Obliterator weapons, and the Oracle of Time
    (Norma Cenva) transporting Omnius to another dimension. Erasmus activated
    a kill-switch on all Enhanced Face Dancers.

    Source: dune.fandom.com/wiki/15264_AG
    Source: Sandworms of Dune (2007)
  date_start: 15264
  date_precision: exact
  significance: 5
  category: military
  tags: ["kralizec", "final-battle", "apocalypse", "prophecy", "synchrony"]
  factions: ["bene-gesserit", "thinking-machines"]
  characters: ["duncan-idaho", "omnius", "erasmus", "murbella", "norma-cenva"]
  books:
