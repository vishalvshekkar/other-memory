- id: omnius-scourge
  type: milestone
  title: "The Omnius Scourge"
  description: "Omnius infects League Worlds with a devastating plague, killing billions. Raquella Berto-Anirul discovers that melange may offer protection. The League launches the Great Purge fleet, burning all Synchronized Worlds except Corrin."
  detailed: |
    In 108 BG, Omnius unleashed a bioweapon — the Omnius Scourge — across
    League planets, causing the death of billions. During the crisis, Raquella
    Berto-Anirul discovered that spice melange offered some protection against
    the disease. The League responded with the Great Purge, a fleet that
    systematically destroyed all Synchronized Worlds except Corrin, where
    Omnius made its last stand.

    Source: Dune: The Battle of Corrin (2004)
    Reference: https://dune.fandom.com/wiki/Timeline_(Expanded_Dune)
  date_start: -108
  date_precision: exact
  significance: 5
  category: military
  tags: ["scourge", "plague", "great-purge", "billions-dead"]
  factions: ["thinking-machines"]
