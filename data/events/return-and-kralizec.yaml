      notes: "Climactic event"

- id: duncan-idaho-ultimate-kwisatz-haderach
  type: milestone
  title: "Duncan Idaho Becomes the Ultimate Kwisatz Haderach"
  subtitle: "The culmination of all genetic lines"
  description: "Through millennia of ghola lives, Duncan Idaho achieves a transcendent state, becoming the ultimate Kwisatz Haderach and the new Evermind who brokers peace between humans and machines."
  detailed: |
    Duncan Idaho is revealed as the Ultimate and final Kwisatz Haderach.
    He becomes the new Evermind, replacing Omnius, establishing a new peace
    between humans and robots. Sheeana Brugh establishes the second Orthodox
    Sisterhood on Synchrony.

    Source: dune.fandom.com/wiki/Kralizec/XD
    Source: Sandworms of Dune (2007)
