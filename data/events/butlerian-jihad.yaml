- id: bene-gesserit-formalized
  type: point
  title: "Bene Gesserit Order Formalized"
  description: "The Sisterhood of Rossak completes its institutional transformation into the Bene Gesserit order, with formal organizational structure, training programs, and the Missionaria Protectiva."
  detailed: |
    The formal establishment of the Bene Gesserit as a recognized institution
    occurred during the period covered by "Sisterhood of Dune." The Sisterhood
    of Rossak (founded -88 BG by Raquella) evolved into the Bene Gesserit with
    its characteristic training, political influence, and the breeding program
    that would eventually produce the Kwisatz Haderach.

    Note: Three distinct events mark the Bene Gesserit's origin:
    • -108 BG: Raquella becomes the first Reverend Mother
    • -88 BG: Sisterhood of Rossak formally founded
    • ~-5 to 50 AG: Institutional formalization into the Bene Gesserit

    Source: Sisterhood of Dune (2012)
