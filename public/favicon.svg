<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Moon surface texture using fractal noise -->
    <filter id="moonSurface" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="5" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="surfaceDetail">
        <feFuncR type="linear" slope="0.3" intercept="0.35"/>
        <feFuncG type="linear" slope="0.3" intercept="0.35"/>
        <feFuncB type="linear" slope="0.3" intercept="0.35"/>
      </feComponentTransfer>
      <feComposite operator="in" in="surfaceDetail" in2="SourceGraphic" result="masked"/>
      <feBlend in="masked" in2="SourceGraphic" mode="multiply"/>
    </filter>

    <!-- Silvery-white lighting for larger moon (First Moon) -->
    <radialGradient id="moonLightLarge" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#f0f0f8" stop-opacity="1"/>
      <stop offset="30%" stop-color="#dde0ec" stop-opacity="1"/>
      <stop offset="55%" stop-color="#b8bdd0" stop-opacity="1"/>
      <stop offset="80%" stop-color="#8088a0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#505868" stop-opacity="1"/>
    </radialGradient>

    <!-- Ivory-blue lighting for smaller moon (Second Moon) -->
    <radialGradient id="moonLightSmall" cx="42%" cy="36%" r="55%">
      <stop offset="0%" stop-color="#e8ecf4" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ccd4e4" stop-opacity="1"/>
      <stop offset="55%" stop-color="#a0acc4" stop-opacity="1"/>
      <stop offset="80%" stop-color="#707c98" stop-opacity="1"/>
      <stop offset="100%" stop-color="#484e60" stop-opacity="1"/>
    </radialGradient>

    <!-- Subtle cool glow behind moons -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="#a0b0d0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a0b0d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle ambient glow -->
  <circle cx="260" cy="240" r="240" fill="url(#moonGlow)"/>

  <!-- Second Moon (smaller, behind) -->
  <circle cx="190" cy="185" r="120" fill="url(#moonLightSmall)" filter="url(#moonSurface)"/>

  <!-- First Moon (larger, in front) -->
  <circle cx="300" cy="290" r="170" fill="url(#moonLightLarge)" filter="url(#moonSurface)"/>
</svg>
