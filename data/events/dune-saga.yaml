# === God Emperor of Dune (13,728 AG) ===

- id: leto-ii-death
  type: milestone
  title: "Death of the God Emperor"
  subtitle: "Leto II's 3,500-year reign ends"
  description: "Leto II is assassinated, plunging into the Idaho River. His death triggers the Scattering — humanity's diaspora into the unknown universe, as he planned."
  detailed: |
    Leto II orchestrated his own assassination as the final act of the Golden Path.
    His death released the sandtrout from his body, beginning the restoration of
    Arrakis' desert ecosystem. The Famine Times that followed drove humanity to
    scatter across the universe, ensuring the species could never be trapped or
    destroyed by a single prescient predator.
  date_start: 13728
  date_precision: exact
  significance: 5
  category: political
  tags: ["golden-path", "assassination", "famine-times"]
  factions: ["atreides"]
  characters: ["leto-ii", "siona-atreides", "duncan-idaho"]
  books:
    - book_id: god-emperor-of-dune-1981

