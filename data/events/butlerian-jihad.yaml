# --- Butlerian Jihad ---

- id: erasmus-kills-manion
  type: milestone
  title: "Erasmus Kills Baby Manion — Jihad Spark"
  description: "The robot Erasmus kills Serena Butler's infant son Manion the Innocent, directly sparking the human rebellion that becomes the Butlerian Jihad."
  detailed: |
    In 201 BG, Erasmus dropped the baby Manion from a balcony to observe human
    reactions to grief. This act of cruelty ignited the slave revolt on Earth
    and unified humanity's rage against the thinking machines. Serena Butler,
    Iblis Ginjo, and Vorian Atreides escaped to Salusa Secundus. The League
    of Nobles formally declared the Butlerian Jihad.

    Source: Dune: The Butlerian Jihad (2002)
    Reference: https://dune.fandom.com/wiki/Timeline_(Expanded_Dune)
  date_start: -201
  date_precision: exact
  significance: 5
  category: military
  tags: ["serena-butler", "spark", "uprising", "manion-the-innocent"]
  factions: ["thinking-machines"]
  characters: ["serena-butler", "erasmus", "iblis-ginjo", "vorian-atreides"]
  books:
    - book_id: butlerian-jihad-2002

