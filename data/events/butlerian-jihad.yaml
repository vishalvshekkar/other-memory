# --- Pre-Jihad Events ---

- id: titans-seize-power
  type: milestone
  title: "Titans Seize Control of the Old Empire"
  description: "Twenty human rebels led by Tlaloc overthrow the decadent Old Empire. They conquer human-occupied worlds among themselves, beginning the Time of Titans."
  detailed: |
    In 1287 BG, twenty ambitious humans — including Agamemnon, Juno, Ajax, and
    Xerxes — orchestrated a coordinated revolt across the Old Empire. They
    exploited the apathetic populace and reprogrammed computers to serve them.
    Some systems on the Empire's edge resisted and founded the League of Nobles,
    led by Bovko Manresa of Salusa Secundus.

    Source: Dune: The Butlerian Jihad (2002)
    Reference: https://dune.fandom.com/wiki/Titans
  date_start: -1287
  date_precision: exact
  significance: 4
  category: political
  tags: ["titans", "cymeks", "old-empire", "coup"]
  factions: ["thinking-machines"]
  characters: ["agamemnon", "juno", "ajax", "xerxes"]
